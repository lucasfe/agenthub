name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened]

jobs:
  pr-title:
    name: PR Title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      statuses: write
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            perf
            ci
            build
            revert

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm test

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Real-API tests for external integrations (GitHub Issue Creator, etc).
    # Skips itself cleanly when secrets are absent (e.g. on forked-PR CI),
    # so we always run the job — the Deno test cases self-ignore.
    env:
      GH_TEST_TOKEN: ${{ secrets.GH_TEST_TOKEN }}
      GH_TEST_REPO: ${{ vars.GH_TEST_REPO || 'lucasfe/agenthub' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x
      - run: npm install
      - run: npm run test:functions:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      deployments: read
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npx playwright install chromium --with-deps

      # On PRs: wait for Vercel preview and test against it
      - name: Wait for Vercel preview deploy
        if: github.event_name == 'pull_request'
        id: vercel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          REPO="${{ github.repository }}"
          echo "Waiting for Vercel preview deploy for $SHA..."

          for i in $(seq 1 30); do
            DEPLOY_URL=$(gh api "repos/$REPO/deployments?sha=$SHA&environment=Preview" \
              --jq '.[0].id // empty' 2>/dev/null)

            if [ -n "$DEPLOY_URL" ]; then
              URL=$(gh api "repos/$REPO/deployments/$DEPLOY_URL/statuses" \
                --jq '[.[] | select(.state == "success")][0].environment_url // empty' 2>/dev/null)

              if [ -n "$URL" ]; then
                echo "Preview URL: $URL"
                echo "url=$URL" >> $GITHUB_OUTPUT
                break
              fi
            fi

            echo "Attempt $i/30 — waiting 10s..."
            sleep 10
          done

          if [ -z "$URL" ]; then
            echo "Timeout waiting for Vercel preview deploy"
            exit 1
          fi

      - name: Run E2E against Vercel preview
        if: github.event_name == 'pull_request'
        env:
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          PREVIEW_URL="${{ steps.vercel.outputs.url }}"
          echo "Running Playwright against: $PREVIEW_URL"
          PLAYWRIGHT_BASE_URL="$PREVIEW_URL" npx playwright test --project=chromium

      # On push: skip E2E (local dev server can't reliably connect to Supabase in CI)
      # E2E runs against Vercel preview on PRs where the full environment is available
      - name: Skip E2E on push
        if: github.event_name == 'push'
        run: echo "E2E tests skipped on push — will run against Vercel preview on PR"
