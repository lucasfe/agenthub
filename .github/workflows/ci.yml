name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e

  smoke-deploy:
    name: Smoke Test Deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    permissions:
      deployments: read
    steps:
      - name: Wait for Vercel preview deploy
        id: vercel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          REPO="${{ github.repository }}"
          echo "Waiting for Vercel preview deploy for $SHA..."

          for i in $(seq 1 30); do
            DEPLOY_URL=$(gh api "repos/$REPO/deployments?sha=$SHA&environment=Preview" \
              --jq '.[0].id // empty' 2>/dev/null)

            if [ -n "$DEPLOY_URL" ]; then
              URL=$(gh api "repos/$REPO/deployments/$DEPLOY_URL/statuses" \
                --jq '[.[] | select(.state == "success")][0].environment_url // empty' 2>/dev/null)

              if [ -n "$URL" ]; then
                echo "Preview URL: $URL"
                echo "url=$URL" >> $GITHUB_OUTPUT
                break
              fi
            fi

            echo "Attempt $i/30 — waiting 10s..."
            sleep 10
          done

          if [ -z "$URL" ]; then
            echo "Timeout waiting for Vercel preview deploy"
            exit 1
          fi
      - name: Smoke test preview URL
        env:
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          PREVIEW_URL="${{ steps.vercel.outputs.url }}"
          BYPASS="-H x-vercel-protection-bypass:$BYPASS_SECRET"
          echo "Testing preview: $PREVIEW_URL"

          # Test /ai/agenthub without trailing slash
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" $BYPASS "$PREVIEW_URL/ai/agenthub")
          echo "/ai/agenthub -> $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: /ai/agenthub returned $STATUS (expected 200)"
            exit 1
          fi

          # Test /ai/agenthub/ with trailing slash
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" $BYPASS "$PREVIEW_URL/ai/agenthub/")
          echo "/ai/agenthub/ -> $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: /ai/agenthub/ returned $STATUS (expected 200)"
            exit 1
          fi

          # Test that JS assets load correctly (not HTML)
          JS_PATH=$(curl -s $BYPASS "$PREVIEW_URL/ai/agenthub/" | grep -o 'src="[^"]*\.js"' | head -1 | sed 's/src="//;s/"//')
          if [ -n "$JS_PATH" ]; then
            JS_CONTENT=$(curl -s $BYPASS "$PREVIEW_URL$JS_PATH" | head -c 50)
            if echo "$JS_CONTENT" | grep -q "<!doctype"; then
              echo "FAIL: JS asset returned HTML instead of JavaScript"
              exit 1
            fi
            echo "JS asset loads correctly"
          fi

          # Test a sub-route (SPA routing)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" $BYPASS "$PREVIEW_URL/ai/agenthub/teams")
          echo "/ai/agenthub/teams -> $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: /ai/agenthub/teams returned $STATUS (expected 200)"
            exit 1
          fi

          echo "All smoke tests passed!"
