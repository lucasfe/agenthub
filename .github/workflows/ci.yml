name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened]

jobs:
  pr-title:
    name: PR Title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      statuses: write
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            perf
            ci
            build
            revert

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm test

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Real-API tests for external integrations (GitHub Issue Creator, etc).
    # Skips itself cleanly when secrets are absent (e.g. on forked-PR CI),
    # so we always run the job — the Deno test cases self-ignore.
    env:
      GH_TEST_TOKEN: ${{ secrets.GH_TEST_TOKEN }}
      GH_TEST_REPO: ${{ vars.GH_TEST_REPO || 'lucasfe/agenthub' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x
      - run: npm install
      - run: npm run test:functions:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_E2E_AUTH_BYPASS: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npx playwright install chromium --with-deps

      - name: Build app with E2E auth bypass
        run: npm run build

      - name: Run E2E against local preview
        run: |
          npm run preview -- --port 4173 &
          PREVIEW_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4173/ > /dev/null; then break; fi
            sleep 1
          done
          PLAYWRIGHT_BASE_URL=http://localhost:4173 npx playwright test --project=chromium
          STATUS=$?
          kill $PREVIEW_PID 2>/dev/null || true
          exit $STATUS
